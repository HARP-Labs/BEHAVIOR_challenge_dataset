app: vjepa_droid

meta:
  dtype: float32
  use_sdpa: true
  pretrain_checkpoint: /your_file_path/checkpoints/latest.pt
  context_encoder_key: encoder
  target_encoder_key: target_encoder

model:
  model_name: vit_giant2
  use_rope: true
  use_silu: false
  wide_silu: true

data:
  datasets:
    - /your_file_path/behavior/manifest.json
  dataset_fpcs:
    - 16
  batch_size: 8
  fps: 5
  crop_size: 256
  patch_size: 16
  tubelet_size: 2
  num_workers: 12
  persistent_workers: true
  prefetch_factor: 4
  pin_mem: true
  stereo_view: false
  camera_frame: false
  state_start_idx: 0
  state_dim: 7
  action_dim: 23

data_aug:
  auto_augment: false
  horizontal_flip: false
  motion_shift: false
  random_resize_aspect_ratio:
    - 0.75
    - 1.35
  random_resize_scale:
    - 1.777
    - 1.777
  reprob: 0.0

output:
  # optional local mirror; set to null to only stream to HF
  local_output_dir: null
  hf_repo_id: your-org/behavior-preencoded
  hf_path_prefix: shards/vitg16-256px-8f
  episodes_per_shard: 1
