meta:
  dtype: bfloat16
  compile: true

model:
  backend: hf
  hf_repo: facebook/vjepa2-vitg-fpc64-256  # swap to any HF vjepa2 repo here
  temporal_patch_size: 2  # tubelet size; auto-detected from model config, this is the fallback

data:
  datasets:
    - /content/base_dataset/manifest.json
  dataset_fpcs:
    - 32
  batch_size: 4
  fps: 5
  crop_size: 256
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 8
  pin_mem: true
  camera_view: multi  # "head" or "multi" (head + left_wrist + right_wrist)
  action_dim: 23
  cache_parquet: true
  cache_video_readers: false
  cache_max_entries: 12

data_aug:
  auto_augment: false
  horizontal_flip: false
  motion_shift: false
  random_resize_aspect_ratio:
    - 0.75
    - 1.35
  random_resize_scale:
    - 1.777
    - 1.777
  reprob: 0.0

output:
  local_output_dir:
  hf_repo_id: quastAI/behavior2025-vjepa2-vitg-130h-demo-embeddings
  hf_path_prefix: shards_256px_vit_16_g
  max_shard_bytes: 268435456   # 256 MiB — was 1 GiB; faster commits, smaller blast radius per stall
  commit_batch_size: 5         # 5 × 256 MiB = 1.25 GiB per commit; completes in ~30s not 30min
  num_upload_workers: 4        # S3 parallelism via preupload_lfs_files; commits are serialized
  max_pending_shards: 10       # truly idle shards (excludes in-flight); tight cap on disk backlog
  upload_timeout: 600          # seconds before a stalled socket raises and triggers retry
